# Creator MMFC — 全套服务（PostgreSQL + 用户端 + Worker + 管理端 API + 管理端 Web）
# 用法：在仓库根目录复制 .env.docker.example 为 .env 并填写后执行：
#   docker compose up -d --build
#
# 内网访问：将 NEXTAUTH_URL / CORS_ORIGIN 等改为 http://<服务器局域网IP>:端口
# 默认端口：用户端 3000，管理后台 8080（API 经 Nginx 同端口代理，无需单独暴露 3100）

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seedance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    # 不映射 5432 到宿主机，仅容器内网访问；若需本机工具连库，可取消下一行注释：
    # ports:
    #   - "5432:5432"

  # 使用 admin/prisma/schema.prisma 做 db push。若卷内旧库与当前 schema 漂移，Prisma 可能要求
  # 删除/重建表并提示 --accept-data-loss：优先 `docker compose build --no-cache db-init` 再 up；
  # 仅开发库可在根 .env 设 PRISMA_ACCEPT_DATA_LOSS=1（会按 Prisma 提示丢弃冲突表数据，勿用于生产）。
  db-init:
    build:
      context: .
      dockerfile: admin/server/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/seedance
      PRISMA_ACCEPT_DATA_LOSS: ${PRISMA_ACCEPT_DATA_LOSS:-0}
      # 默认 0：不运行 seed-prompts，避免用代码覆盖数据库中已维护的 Prompt 模板。
      # 全新环境若占位文案需从代码灌入，可在根 .env 设 SEED_PROMPTS_FROM_CODE=1 后单独跑 db-init。
      SEED_PROMPTS_FROM_CODE: ${SEED_PROMPTS_FROM_CODE:-0}
    working_dir: /app
    command: ["sh", "./scripts/db-init.sh"]

  web-app:
    # 注意：context 改为仓库根，Dockerfile 同时构建 web/ 与 MMFC-canvas/
    build:
      context: .
      dockerfile: ./web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      # 视频产物
      - ./web/data/videos:/data/videos
      # 画布生成图 / 参考图（与容器内 IMAGE_STORAGE_PATH 对齐）
      - canvas_images:/data/canvas-images
      # GCS 凭证：在根 .env 设置 GCS_CREDENTIALS_FILE=./web/gcs-credentials.json（未使用 GCS 请删本 bind mount，并勿将真实 JSON 提交仓库）
      - ${GCS_CREDENTIALS_FILE:-./web/gcs-credentials.json}:/run/secrets/gcs-credentials.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/seedance
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-pro-preview}
      SEEDANCE_API_KEY: ${SEEDANCE_API_KEY:-}
      SEEDANCE_ENDPOINT: ${SEEDANCE_ENDPOINT:-}
      SEEDANCE_MODEL: ${SEEDANCE_MODEL:-dreamina-seedance-2-0-260128}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcs-credentials.json}
      VIDEO_STORAGE_PATH: /data/videos
      # 画布生成 / 上传图片的存储目录（持久化卷 canvas_images 挂载到此处）
      IMAGE_STORAGE_PATH: ${IMAGE_STORAGE_PATH:-/data/canvas-images}

  web-worker:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    restart: unless-stopped
    command: ["npx", "tsx", "src/worker/index.ts"]
    volumes:
      - ./web/data/videos:/data/videos
      - canvas_images:/data/canvas-images
      - ${GCS_CREDENTIALS_FILE:-./web/gcs-credentials.json}:/run/secrets/gcs-credentials.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/seedance
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SEEDANCE_API_KEY: ${SEEDANCE_API_KEY:-}
      SEEDANCE_MODEL: ${SEEDANCE_MODEL:-dreamina-seedance-2-0-260128}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcs-credentials.json}
      VIDEO_STORAGE_PATH: /data/videos
      IMAGE_STORAGE_PATH: ${IMAGE_STORAGE_PATH:-/data/canvas-images}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-15000}

  admin-api:
    build:
      context: .
      dockerfile: admin/server/Dockerfile
    restart: unless-stopped
    volumes:
      # 与 web-app 同卷，便于后台硬删画布项目时清理本地图片
      - canvas_images:/data/canvas-images
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/seedance
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      PORT: "3100"
      IMAGE_STORAGE_PATH: ${IMAGE_STORAGE_PATH:-/data/canvas-images}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:3100/api/admin/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-web:
    build:
      context: ./admin/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-8080}:8080"
    depends_on:
      admin-api:
        condition: service_healthy

volumes:
  pgdata:
  canvas_images:
